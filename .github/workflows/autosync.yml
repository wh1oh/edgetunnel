name: Auto Sync Fork (Keep Commits & Exclude Workflows)

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0 点
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git || true
          git fetch upstream

      - name: Check for upstream updates
        run: |
          LOCAL=$(git rev-parse main)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "No updates from upstream. Exiting."
            exit 0
          fi

      - name: Merge upstream changes excluding workflows
        run: |
          # 创建临时分支从 upstream/main
          git checkout -b upstream-temp upstream/main
          # 删除 workflow 文件，避免覆盖
          git rm -r --cached .github/workflows || true
          git commit -m "Remove workflows from upstream temp" || true
          # 回到 fork main
          git checkout main
          # 合并临时分支
          git merge upstream-temp --allow-unrelated-histories -m "Merge upstream changes excluding workflows"
          # 删除临时分支
          git branch -D upstream-temp

      - name: Push changes to fork
        run: |
          git push origin main
