name: Auto Sync Fork (Auto-resolve Conflicts, Exclude Workflows)

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0 点
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout fork
        uses: actions/checkout@v3
        with:
          ref: main
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git || true
          git fetch upstream

      - name: Check for upstream updates
        run: |
          LOCAL=$(git rev-parse main)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "No updates from upstream. Exiting."
            exit 0
          fi

      - name: Auto-sync upstream code excluding workflows
        run: |
          # 创建临时分支指向 upstream
          git checkout -b upstream-temp upstream/main
          # 删除 workflows 文件，确保不覆盖
          git rm -r --cached .github/workflows || true
          git commit -m "Remove workflows from upstream temp" || true

          # 回到 fork main 分支
          git checkout main

          # merge 临时分支，冲突时采用 upstream 的内容
          git merge upstream-temp -X theirs -m "Auto-sync upstream changes (excluding workflows, auto-resolve conflicts)"

          # 删除临时分支
          git branch -D upstream-temp

      - name: Push changes to fork
        run: |
          git push origin main