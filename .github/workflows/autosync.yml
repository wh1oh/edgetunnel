name: Auto Sync Fork (Auto-resolve Conflicts, Exclude Workflows)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout fork
        uses: actions/checkout@main
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git || true
          git fetch upstream

      - name: Check for upstream updates
        id: check
        run: |
          LOCAL=$(git rev-parse main)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync upstream excluding workflows
        if: steps.check.outputs.skip == 'false'
        run: |
          # 备份自己的 workflows 到临时目录
          mkdir -p /tmp/my-workflows
          cp -r .github/workflows/. /tmp/my-workflows/

          # 合并 upstream，冲突全部采用 upstream
          git merge upstream/main -X theirs --no-commit --allow-unrelated-histories || true

          # 还原自己的 workflows（覆盖 upstream 的）
          cp -r /tmp/my-workflows/. .github/workflows/

          # 暂存所有变更
          git add -A

          # 提交
          git commit -m "Auto-sync upstream changes (excluding workflows)" || echo "Nothing to commit"

      - name: Push changes to fork
        if: steps.check.outputs.skip == 'false'
        run: git push origin main
