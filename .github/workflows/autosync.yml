name: Auto Sync Fork (Keep Commits & Exclude Workflows)

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 0 点
  workflow_dispatch:       # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制使用 Node.js 24

    steps:
      - name: Checkout fork
        uses: actions/checkout@v3  # 最新 v3 稳定版
        with:
          ref: main
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git || true
          git fetch upstream

      - name: Check for upstream updates
        run: |
          LOCAL=$(git rev-parse main)
          UPSTREAM=$(git rev-parse upstream/main)
          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "No updates from upstream. Exiting."
            exit 0
          fi

      - name: Merge upstream excluding workflows and auto-resolve conflicts
        run: |
          git checkout -b upstream-temp upstream/main
          git rm -r --cached .github/workflows || true
          git commit -m "Remove workflows from upstream temp" || true
          git checkout main
          git merge upstream-temp -X theirs -m "Merge upstream changes excluding workflows, auto-resolve conflicts"
          git branch -D upstream-temp

      - name: Push changes to fork
        run: |
          git push origin main