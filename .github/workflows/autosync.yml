name: Auto Sync Fork (Auto-resolve Conflicts, Exclude Workflows)

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git || true
          git fetch upstream

      - name: Check for upstream updates
        run: |
          LOCAL=$(git rev-parse main)
          UPSTREAM=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "No updates from upstream. Exiting."
            exit 0
          fi

      - name: Auto-sync upstream changes excluding workflows
        run: |
          # 暂存自己的 workflows，避免切换分支时报错
          git stash push -- .github/workflows || true

          # 创建临时分支
          git checkout -b upstream-temp upstream/main

          # 从临时分支索引中移除 workflows，但不提交
          git rm -r --cached .github/workflows || true

          # 切回 main 分支
          git checkout main

          # 恢复自己的 workflows 文件
          git stash pop || true

          # 合并 upstream，冲突时优先采用 upstream 内容
          git merge upstream-temp -X theirs --no-commit

          # 再次确保保留自己的 workflows
          git restore --source=HEAD --staged --worktree .github/workflows || true

          # 提交最终同步结果
          git commit -m "Auto-sync upstream changes (excluding workflows)" || echo "No changes to commit"

          # 删除临时分支
          git branch -D upstream-temp

      - name: Push changes to fork
        run: |
          git push origin main