name: Manual Sync Fork (Auto-resolve Conflicts, Exclude Workflows)

on:
  workflow_dispatch:
    inputs:
      upstream_url:
        description: 'Upstream repository URL'
        required: true
        default: 'https://github.com/cmliu/edgetunnel.git'
      branch:
        description: 'Branch to sync'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    env:
      BRANCH: ${{ github.event.inputs.branch }}
      UPSTREAM_URL: ${{ github.event.inputs.upstream_url }}

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream "${UPSTREAM_URL}" || true
          git fetch upstream

      - name: Check for upstream updates
        id: check
        run: |
          # Check if upstream branch exists
          if ! git rev-parse "upstream/${BRANCH}" > /dev/null 2>&1; then
            echo "::error::upstream/${BRANCH} does not exist, please verify the branch name or upstream URL"
            exit 1
          fi

          LOCAL=$(git rev-parse "${BRANCH}")
          UPSTREAM=$(git rev-parse "upstream/${BRANCH}")

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Local branch is up to date with upstream, skipping sync"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Upstream changes detected, proceeding with sync"
          fi

      - name: Sync upstream excluding workflows
        if: steps.check.outputs.skip == 'false'
        run: |
          set -e

          # 1. Backup local workflows
          mkdir -p /tmp/local-workflows
          if [ -d .github/workflows ]; then
            cp -r .github/workflows/. /tmp/local-workflows/
          fi

          # 2. Remove workflows before merge (prevents conflict)
          rm -rf .github/workflows

          # 3. Merge upstream safely
          if ! git merge "upstream/${BRANCH}" -X theirs --no-commit --allow-unrelated-histories; then
            echo "::error::Merge failed, aborting sync"
            git merge --abort
            exit 1
          fi

          # 4. Extract upstream workflows outside .github
          rm -rf upstream-workflows
          mkdir -p upstream-workflows
          git ls-tree -r "upstream/${BRANCH}" --name-only \
            | grep '^.github/workflows/' \
            | while read f; do
                git show "upstream/${BRANCH}:$f" > "upstream-workflows/$(basename "$f")" || true
              done

          # 5. Restore ONLY local workflows
          mkdir -p .github/workflows
          if [ -d /tmp/local-workflows ]; then
            cp /tmp/local-workflows/* .github/workflows/ 2>/dev/null || true
          fi

          # 6. Stage all, then unstage workflows
          git add -A
          git reset .github/workflows || true
          git add -A

          git commit -m "Auto-sync upstream/${BRANCH} changes (excluding workflows)" || echo "Nothing to commit"

      - name: Patch _worker.js Pages静态页面
        if: steps.check.outputs.skip == 'false'
        run: |
          set -e
          FILE="_worker.js"
          OLD="const Pages静态页面 = 'https://edt-pages.github.io';"
          NEW="const Pages静态页面 = 'https://wh1oh.github.io/edt-pages';"

          if [ -f "$FILE" ]; then
            if grep -qF "$OLD" "$FILE"; then
              sed -i "s|${OLD}|${NEW}|g" "$FILE"
              echo "Patched: replaced Pages静态页面 URL in ${FILE}"
            else
              echo "::warning::Target string not found in ${FILE}, skipping patch"
            fi
            git add "$FILE"
            git commit -m "Patch: update Pages静态页面 URL to 33h.github.io/edt-pages" || echo "Nothing to commit"
          else
            echo "::warning::${FILE} not found, skipping patch"
          fi

      - name: Push changes
        if: steps.check.outputs.skip == 'false'
        run: git push origin "${BRANCH}"

      - name: Summary
        if: always()
        run: |
          echo "### Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${BRANCH} |" >> $GITHUB_STEP_SUMMARY
          echo "| Upstream URL | ${UPSTREAM_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ${{ steps.check.outputs.skip }} |" >> $GITHUB_STEP_SUMMARY