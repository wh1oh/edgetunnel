name: Manual Sync Fork (Auto-resolve Conflicts, Exclude Workflows)

on:
  # Run daily at 00:00 UTC (08:00 Beijing time)
  #schedule:
    #- cron: '0 0 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git || true
          git fetch upstream

      - name: Check for upstream updates
        id: check
        run: |
          LOCAL=$(git rev-parse main)
          UPSTREAM=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync upstream excluding workflows
        if: steps.check.outputs.skip == 'false'
        run: |
          # Backup local workflows
          mkdir -p /tmp/my-workflows
          cp -r .github/workflows/. /tmp/my-workflows/

          # Merge upstream changes (prefer upstream on conflicts)
          git merge upstream/main -X theirs --no-commit --allow-unrelated-histories || true

          # Restore local workflows (prevent overwrite by upstream)
          cp -r /tmp/my-workflows/. .github/workflows/

          # Commit changes
          git add -A
          git commit -m "Auto-sync upstream changes (excluding workflows)" || echo "Nothing to commit"

      - name: Push changes
        if: steps.check.outputs.skip == 'false'
        run: git push origin main