name: Manual Sync Fork (Auto-resolve Conflicts, Exclude Workflows)

on:
  # Run daily at 00:00 UTC (08:00 Beijing time)
  #schedule:
    #- cron: '0 0 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v6.0.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Git identity
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/cmliu/edgetunnel.git || true
          git fetch upstream

      - name: Check for upstream updates
        id: check
        run: |
          LOCAL=$(git rev-parse main)
          UPSTREAM=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync upstream excluding workflows
        if: steps.check.outputs.skip == 'false'
        run: |
          set -e

          # 1. Backup local workflows
          mkdir -p /tmp/local-workflows
          if [ -d .github/workflows ]; then
            find .github/workflows \
              -maxdepth 1 \
              -type f \( -name "*.yml" -o -name "*.yaml" \) \
              -exec cp {} /tmp/local-workflows/ \;
          fi

          # 2. Remove workflows before merge (prevent contamination)
          rm -rf .github/workflows

          # 3. Merge upstream safely
          git merge upstream/main -X theirs --no-commit --allow-unrelated-histories || true

          # 4. Extract upstream workflows (directly from git objects, NOT working tree)
          mkdir -p .github/workflows/backup

          git ls-tree -r upstream/main --name-only \
            | grep '^.github/workflows/' \
            | while read f; do
                mkdir -p ".github/workflows/backup"
                git show "upstream/main:$f" > ".github/workflows/backup/$(basename "$f")" || true
              done

          # 5. Restore local workflows
          if [ -d /tmp/local-workflows ]; then
            mkdir -p .github/workflows
            cp -r /tmp/local-workflows/. .github/workflows/
          fi

          # 6. Commit ONLY non-workflow changes
          git add -A
          git reset .github/workflows || true
          git add -A

          git commit -m "Auto-sync upstream changes (excluding workflows)" || echo "Nothing to commit"

      - name: Push changes
        if: steps.check.outputs.skip == 'false'
        run: git push origin main